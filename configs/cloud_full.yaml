seed: 42
output_dir: outputs/cloud_full
device: cuda

dataset:
  name: cifar10
  data_dir: data/raw
  offline_fallback: false
  partition_dir: data/partitions
  partition_type: pathological   # pathological | practical
  train_ratio: 0.8
  pathological:
    classes_per_client: 2
  practical:
    dirichlet_gamma: 0.3

federated:
  num_clients: 10
  participation_rate: 1.0
  rounds: 100
  local_epochs: 5
  batch_size: 256

optimizer:
  name: sgd
  lr_proxy: 0.01
  lr_local: 0.01
  lr_gate: 0.01
  momentum: 0.9
  weight_decay: 0.0

model:
  feature_dim: 128
  gate_hidden_dim: 64

eval:
  target_accuracy: 0.85
